name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npx tsc --noEmit -p tsconfig.json
      - run: npm test
      - run: npm run build
      - name: Check prebuilt extension/ is in sync
        run: |
          rm -rf extension && cp -r .output/chrome-mv3 extension
          if ! git diff --quiet -- extension; then
            echo "::error::extension/ is stale. Run 'npm run pack' and commit the result."
            git diff --stat -- extension
            exit 1
          fi
      - name: Package extension
        run: |
          cd .output/chrome-mv3
          zip -r ../../litcode-chrome.zip .
      - uses: actions/upload-artifact@v4
        with:
          name: litcode-chrome
          path: litcode-chrome.zip
